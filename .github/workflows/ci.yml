name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - uses: extractions/setup-just@v3
      - name: Ensure shellcheck
        run: shellcheck --version || (sudo apt-get update && sudo apt-get install -y shellcheck)
      - name: Install Claude Code via bun (for claude plugin validate)
        run: |
          bun add -g @anthropic-ai/claude-code
          bun pm bin -g >> "$GITHUB_PATH"
      - run: just ci
