name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint scripts and hooks
        run: |
          set -e
          files=$(git ls-files 'scripts/*.sh' 'hooks/*.sh')
          if [ -z "$files" ]; then
            echo "No shell scripts found."
            exit 0
          fi
          echo "Linting: $files"
          # shellcheck は引数リストに対して一括で走らせる
          # shellcheck disable=SC2086
          shellcheck $files
